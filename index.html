<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:   #0e0a10;
  --bg2:  #130e16;
  --bg3:  #1a1422;
  --bg4:  #201828;

  --border:     #241830;
  --border-mid: #302040;

  /* розово-сиреневый — primary accent */
  --gold:     #d898b8;
  --gold-dim: #8a4e6e;
  --gold-glow: rgba(216,152,184,.10);

  /* rose — secondary, harmonious */
  --rose:     #d87898;
  --rose-dim: #6c3850;

  /* fog blue — character tab */
  --blue:     #88aace;
  --blue-dim: #486080;

  --cream:     #ede8f0;
  --cream-dim: #a090b0;
  --cream-mid: #ccc0d8;

  /* курсивный шрифт — единая точка замены */
  --font-italic: 'Libre Baskerville', Georgia, serif;

  /* layout */
  --ph: 78px;
  --tb: 50px;
  --sb: 252px;
}

/* ── RESET & BASE ────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  overflow-x: hidden;
}

/* Vinyl ambience — warm radial at bottom, cool at top-left */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 55% 45% at 0% 0%,    rgba(100,60,180,.09) 0%, transparent 60%),
    radial-gradient(ellipse 60% 55% at 100% 100%, rgba(160,80,200,.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 110%,  rgba(130,50,160,.06) 0%, transparent 55%);
}

/* Scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--border-mid) transparent; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

/* ── TOPBAR (mobile) ─────────────────────────────────────────── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--tb);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 300;
}
.topbar-menu {
  background: none; border: none; color: var(--cream-mid);
  font-size: 20px; cursor: pointer; padding: 4px 6px; line-height: 1;
}
.topbar-title {
  font-family: 'Playfair Display', serif; font-size: 17px;
  color: var(--gold); letter-spacing: .04em; flex: 1;
}
.topbar-add {
  background: none; border: 1px solid var(--border-mid); border-radius: 6px;
  color: var(--cream-dim); font-family: 'Geist Mono', monospace; font-size: 11px;
  letter-spacing: .08em; padding: 6px 12px; cursor: pointer; white-space: nowrap;
  transition: all .2s;
}
.topbar-add:active { border-color: var(--gold-dim); color: var(--gold); }

/* ── OVERLAY ─────────────────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 100;
  pointer-events: none;
}
.overlay.on { display: block; }

/* ── LAYOUT ──────────────────────────────────────────────────── */
.app {
  display: flex; height: 100vh;
  padding-top: var(--tb); padding-bottom: var(--ph);
  position: relative;
}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar {
  width: var(--sb); min-width: var(--sb);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  position: fixed;
  top: var(--tb); bottom: var(--ph); left: calc(-1 * var(--sb));
  transition: left .25s cubic-bezier(.4,0,.2,1); z-index: 9999;
}
.sidebar.open { left: 0; }

@media (min-width: 600px) {
  .sidebar { position: relative; top: auto; bottom: auto; left: 0 !important; z-index: 1; }
  .topbar-menu { display: none; }
  .topbar { display: none; }
  .app { padding-top: 0; }
}

/* Sidebar header — vinyl record identity */
.sb-head {
  padding: 22px 18px 14px;
  border-bottom: 1px solid var(--border);
  position: relative;
  flex-shrink: 0;
}

/* Vinyl groove ring — decorative, subtle */
.sb-head::after {
  content: '';
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border-mid);
  box-shadow: inset 0 0 0 6px var(--bg2), inset 0 0 0 7px var(--border),
              inset 0 0 0 13px var(--bg2), inset 0 0 0 14px var(--border),
              inset 0 0 0 17px var(--bg2);
  opacity: .4;
  pointer-events: none; /* не перехватывать клики на вкладки */
}

.sb-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 400;
  color: var(--gold); letter-spacing: .03em;
}
.sb-sub {
  font-family: var(--font-italic); font-style: italic;
  font-size: 11px; color: var(--cream-dim); margin-top: 3px; letter-spacing: .02em;
}

/* Tabs */
.sb-tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sb-tab {
  flex: 1; padding: 11px 4px; text-align: center; cursor: pointer;
  font-family: 'Geist Mono', monospace; font-size: 9px;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--cream-dim); border: none;
  border-bottom: 2px solid transparent;
  background: none; transition: all .2s;
  touch-action: manipulation; -webkit-tap-highlight-color: rgba(200,168,112,.15);
}
.sb-tab:hover { color: var(--cream-mid); }
.sb-tab.ts { color: var(--gold); border-bottom-color: var(--gold); }
.sb-tab.tc { color: var(--blue); border-bottom-color: var(--blue); }

/* Scroll list */
.sb-scroll { flex: 1; overflow-y: auto; padding: 4px 0; min-height: 0; }

.sec-label {
  font-family: 'Geist Mono', monospace; font-size: 8px;
  letter-spacing: .22em; text-transform: uppercase;
  color: var(--gold-dim); padding: 10px 16px 3px;
}
.sec-label.r { color: var(--blue-dim); }

.pl-row {
  display: flex; align-items: center;
  padding: 9px 8px 9px 12px;
  cursor: pointer; border-left: 2px solid transparent;
  transition: background .15s, border-color .15s;
  gap: 7px;
  -webkit-tap-highlight-color: transparent;
}
.pl-drag {
  display: flex; align-items: center;
  color: var(--border-mid); font-size: 13px;
  padding: 2px 3px; cursor: grab;
  touch-action: none; user-select: none; -webkit-user-select: none;
  flex-shrink: 0; transition: color .15s;
}
.pl-drag:hover { color: var(--cream-dim); }
.pl-row.sb-dragging { opacity: .3; }
.pl-row.sb-drag-over { border-top: 2px solid var(--gold-dim) !important; }
.pl-row:hover { background: var(--bg3); }

.pl-row.as { border-left-color: var(--gold); background: var(--gold-glow); }
.pl-row.ac { border-left-color: var(--blue); background: rgba(120,152,184,.06); }
.pl-row.ag { border-left-color: var(--rose); background: rgba(176,120,152,.06); }

.pl-ic { font-size: 12px; min-width: 16px; text-align: center; color: var(--cream-dim); }
.pl-nm {
  font-family: 'Playfair Display', serif; font-size: 14px;
  color: var(--cream-mid); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color .15s;
}
.pl-row.as .pl-nm,
.pl-row:hover .pl-nm { color: var(--cream); }
.pl-ct {
  font-family: 'Geist Mono', monospace; font-size: 10px;
  color: var(--cream-dim); min-width: 18px; text-align: right;
}

/* Footer */
.sb-foot {
  flex-shrink: 0; padding: 10px 12px 14px;
  border-top: 1px solid var(--border);
}
.btn-new {
  width: 100%; padding: 10px;
  background: transparent; border: 1px dashed var(--border-mid);
  border-radius: 8px; color: var(--cream-dim);
  font-family: 'Geist Mono', monospace; font-size: 10px;
  letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; transition: all .2s;
}
.btn-new:hover { border-color: var(--gold-dim); color: var(--gold); }
.btn-misc {
  width: 100%; margin-top: 7px; padding: 10px;
  background: transparent; border: 1px solid var(--rose-dim);
  border-radius: 8px; color: var(--rose);
  font-family: 'Geist Mono', monospace; font-size: 10px;
  letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; transition: all .2s;
}
.btn-misc:hover, .btn-misc.on { background: rgba(176,120,152,.1); }

/* ── MAIN ────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-left: var(--sb); }
@media (max-width: 599px) { .main { margin-left: 0; } }

.m-head {
  padding: 20px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0;
}
.m-title {
  font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400;
  color: var(--cream); letter-spacing: .02em; line-height: 1.2;
}
.m-meta {
  font-family: var(--font-italic); font-style: italic;
  font-size: 12px; color: var(--cream-dim); margin-top: 4px;
}
.m-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

/* Buttons */
.btn {
  font-family: 'Geist Mono', monospace; font-size: 10px;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 7px 14px; border-radius: 6px;
  cursor: pointer; border: 1px solid; transition: all .2s; white-space: nowrap;
}
.bp { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }
.bp:hover { background: rgba(200,168,112,.2); border-color: var(--gold); }
.bg { background: transparent; border-color: var(--border-mid); color: var(--cream-dim); }
.bg:hover { border-color: var(--rose-dim); color: var(--rose); }
.bd { background: transparent; border-color: var(--border); color: var(--cream-dim); }
.bd:hover { border-color: rgba(180,60,60,.4); color: #c26060; }

/* ── TRACK LIST ──────────────────────────────────────────────── */
.tr-list { flex: 1; overflow-y: auto; padding: 4px 10px 14px; }

.tr-item {
  display: flex; align-items: center;
  padding: 10px 10px; border-radius: 8px;
  gap: 10px; border: 1px solid transparent;
  margin-bottom: 1px; transition: background .15s, border-color .15s;
  position: relative;
}
.tr-item:hover { background: var(--bg3); }
.tr-item.pl {
  background: var(--gold-glow);
  border-color: rgba(200,168,112,.18);
}

/* Vinyl groove accent on playing item */
.tr-item.pl::before {
  content: '';
  position: absolute; left: -1px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 60%; border-radius: 0 2px 2px 0;
  background: linear-gradient(180deg, transparent, var(--gold), transparent);
  opacity: .7;
}

.tr-num {
  font-family: 'Geist Mono', monospace; font-size: 11px;
  color: var(--cream-dim); min-width: 22px; text-align: right; flex-shrink: 0;
}
.tr-playing-ic {
  font-size: 12px; min-width: 18px; text-align: center;
  display: none; flex-shrink: 0; color: var(--gold); animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
.tr-item.pl .tr-playing-ic { display: block; }
.tr-item.pl .tr-num { display: none; }

.tr-info { flex: 1; min-width: 0; cursor: pointer; }
.tr-name {
  font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400;
  color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color .15s;
}
.tr-item.pl .tr-name { color: var(--gold); }
.tr-artist {
  font-family: var(--font-italic); font-style: italic;
  font-size: 13px; color: var(--cream-dim); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tr-mood {
  font-family: 'Geist Mono', monospace; font-size: 10px;
  color: var(--gold-dim); margin-top: 3px; letter-spacing: .04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Platform links */
.tr-links { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.pl-icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid;
  cursor: pointer; font-size: 13px; transition: all .15s;
  text-decoration: none; flex-shrink: 0;
}
.pi-sp  { border-color: #1a5c30; color: #1db954; background: rgba(29,185,84,.07); }
.pi-sp:hover  { background: rgba(29,185,84,.18); }
.pi-yt  { border-color: #6b1a1a; color: #ff4444; background: rgba(255,68,68,.07); }
.pi-yt:hover  { background: rgba(255,68,68,.18); }
.pi-ap  { border-color: #4a2a5a; color: #fc3c44; background: rgba(252,60,68,.07); }
.pi-ap:hover  { background: rgba(252,60,68,.18); }
.pi-sc  { border-color: #6b3a10; color: #ff5500; background: rgba(255,85,0,.07); }
.pi-sc:hover  { background: rgba(255,85,0,.18); }
.pi-mp3 { border-color: var(--rose-dim); color: var(--rose); background: rgba(176,120,152,.07); cursor: default; }
.pi-mp3.playable { cursor: pointer; }
.pi-mp3.playable:hover { background: rgba(176,120,152,.18); }
.pi-other { border-color: var(--gold-dim); color: var(--gold-dim); background: rgba(200,168,112,.05); }
.pi-other:hover { background: rgba(200,168,112,.14); }

/* Row actions */
.tr-actions {
  display: flex; gap: 1px; flex-shrink: 0;
  opacity: 0; transition: opacity .15s;
}
.tr-item:hover .tr-actions { opacity: 1; }
.ic-btn {
  background: none; border: none; cursor: pointer; font-size: 12px;
  padding: 5px 6px; border-radius: 5px; color: var(--cream-dim);
  transition: background .15s, color .15s;
}
.ic-btn.edit { transform: scaleX(-1); display: inline-block; }
.ic-btn:hover { background: var(--bg4); color: var(--cream); }

/* Drag */
.drag-handle {
  display: flex; align-items: center; justify-content: center;
  width: 20px; flex-shrink: 0; cursor: grab;
  color: var(--border-mid); font-size: 14px; padding: 0 1px;
  touch-action: none; user-select: none; -webkit-user-select: none; transition: color .15s;
}
.drag-handle:hover { color: var(--cream-dim); }
.tr-item.dragging { opacity: .4; background: var(--bg3) !important; }
.tr-item.drag-over { border-top: 2px solid var(--gold) !important; }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--cream-dim); }
.empty-ic { font-size: 36px; margin-bottom: 12px; opacity: .5; }
.empty-tx { font-family: var(--font-italic); font-style: italic; font-size: 14px; }

/* No playlist */
.no-pl {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--cream-dim); gap: 10px;
}
.no-pl .big { font-size: 44px; opacity: .3; }
.no-pl p { font-family: var(--font-italic); font-style: italic; font-size: 14px; }

/* ── PLAYER ──────────────────────────────────────────────────── */
.player {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--ph) + env(safe-area-inset-bottom, 0px));
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px env(safe-area-inset-bottom, 0px);
  gap: 12px; z-index: 100;
}

/* Warm groove line at top of player */
.player::before {
  content: '';
  position: absolute; top: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--gold-dim) 25%, var(--rose-dim) 75%, transparent 100%);
  opacity: .6;
}

.p-info { flex: 1; min-width: 0; }
.p-name {
  font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 400;
  color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.p-art {
  font-family: var(--font-italic); font-style: italic;
  font-size: 12px; color: var(--cream-dim); margin-top: 1px;
}
.p-idle {
  font-family: var(--font-italic); font-style: italic;
  font-size: 13px; color: var(--cream-dim);
}

/* Vinyl record icon (playing indicator in player) */
.p-vinyl {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  position: relative; display: none;
  background: conic-gradient(from 0deg, #160f22 0%, #1e1630 25%, #160f22 50%, #1e1630 75%, #160f22 100%);
  box-shadow: 0 0 0 1px var(--border-mid), 0 0 0 8px var(--bg2), 0 0 0 9px var(--border), 0 0 0 15px var(--bg2), 0 0 0 16px var(--border);
  animation: spin 3s linear infinite paused;
}
.p-vinyl.playing { display: block; animation-play-state: running; }
.p-vinyl::after {
  content: '';
  position: absolute; inset: 0; margin: auto;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); opacity: .7;
}
@keyframes spin { to { transform: rotate(360deg); } }

.p-ctrl { display: flex; gap: 2px; align-items: center; }
.cb {
  background: none; border: none; cursor: pointer;
  font-size: 17px; padding: 6px 7px; color: var(--cream-dim); line-height: 1;
  transition: color .15s; border-radius: 6px;
}
.cb:hover { color: var(--gold); background: var(--gold-glow); }
.cb.main { font-size: 24px; color: var(--cream); }
.cb.main:hover { color: var(--gold); }

.p-prog {
  flex: 2; max-width: 270px;
  display: flex; flex-direction: column; gap: 4px;
}
.prog {
  -webkit-appearance: none; width: 100%; height: 2px;
  background: var(--border-mid); border-radius: 1px; cursor: pointer; outline: none;
}
.prog::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
  background: var(--gold); cursor: pointer;
  box-shadow: 0 0 4px rgba(200,168,240,.4);
}
.t-row {
  display: flex; justify-content: space-between;
  font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--cream-dim);
  letter-spacing: .04em;
}
.vol-row { display: flex; align-items: center; gap: 6px; }
.vol {
  -webkit-appearance: none; width: 55px; height: 2px;
  background: var(--border-mid); border-radius: 1px; cursor: pointer; outline: none;
}
.vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 8px; height: 8px; border-radius: 50%;
  background: var(--cream-dim); cursor: pointer;
}
@media (max-width: 599px) { .p-prog, .vol-row { display: none; } }

/* ── MODALS ──────────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(8,6,14,.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 400; padding: 16px;
}
.modal-bg.h { display: none; }

.modal {
  background: var(--bg2); border: 1px solid var(--border-mid);
  border-radius: 14px; padding: 26px; width: 100%; max-width: 440px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,.65), 0 0 0 1px rgba(200,168,240,.05);
}

.m-ttl {
  font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400;
  color: var(--gold); margin-bottom: 18px; letter-spacing: .02em;
}

.field { margin-bottom: 12px; }
.field label {
  display: block; font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--cream-dim); margin-bottom: 6px;
}
.field input, .field select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border-mid);
  border-radius: 8px; padding: 9px 12px; color: var(--cream);
  font-family: 'Playfair Display', serif; font-size: 15px;
  outline: none; transition: border-color .2s;
}
.field input:focus, .field select:focus { border-color: var(--gold-dim); }
.field select option { background: var(--bg2); }

.sub-f { display: none; }
.sub-f.on { display: block; }

.m-acts {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;
}

.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 12px 0; color: var(--cream-dim);
  font-family: var(--font-italic); font-style: italic; font-size: 12px;
}
.divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid var(--border); }

/* Category selector */
.cat-row { display: flex; gap: 7px; margin-bottom: 14px; }
.cat-opt {
  flex: 1; padding: 9px 4px; text-align: center; cursor: pointer;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Geist Mono', monospace; font-size: 9px;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--cream-dim); transition: all .2s; background: var(--bg3);
}
.cat-opt.cs { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }
.cat-opt.cc { border-color: var(--blue); color: var(--blue); background: rgba(120,152,184,.07); }
.cat-opt.cg { border-color: var(--rose); color: var(--rose); background: rgba(176,120,152,.07); }

/* Link rows */
.link-list { display: flex; flex-direction: column; gap: 7px; }
.link-row { display: flex; gap: 6px; align-items: center; }
.link-row input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border-mid);
  border-radius: 8px; padding: 8px 12px; color: var(--cream);
  font-family: 'Geist Mono', monospace; font-size: 12px;
  outline: none; transition: border-color .2s;
}
.link-row input:focus { border-color: var(--gold-dim); }
.link-rm {
  background: none; border: none; cursor: pointer;
  color: var(--cream-dim); font-size: 15px; padding: 4px 6px; flex-shrink: 0;
  transition: color .15s; border-radius: 4px;
}
.link-rm:hover { color: #c26060; }
.btn-add-link {
  background: none; border: 1px dashed var(--border-mid); border-radius: 8px;
  color: var(--cream-dim); font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  padding: 8px; width: 100%; cursor: pointer; transition: all .2s; margin-top: 4px;
}
.btn-add-link:hover { border-color: var(--gold-dim); color: var(--gold); }

/* Upload */
.up-area {
  border: 1px dashed var(--border-mid); border-radius: 8px;
  padding: 14px; text-align: center; cursor: pointer;
  transition: all .2s; background: var(--bg3);
}
.up-area:hover { border-color: var(--rose-dim); }
.up-tx { font-family: var(--font-italic); font-style: italic; font-size: 13px; color: var(--cream-dim); }
.up-ch { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--rose); margin-top: 4px; }

/* ── MODAL THEME TINTING ─────────────────────────────────────── */
.modal.th-c .m-ttl { color: var(--blue); }
.modal.th-c .btn.bp { background: rgba(120,152,184,.12); border-color: var(--blue-dim); color: var(--blue); }
.modal.th-c .btn.bp:hover { background: rgba(120,152,184,.22); }
.modal.th-c .field input:focus, .modal.th-c .field select:focus,
.modal.th-c .link-row input:focus { border-color: var(--blue-dim); }
.modal.th-c .btn-add-link:hover { border-color: var(--blue-dim); color: var(--blue); }

.modal.th-g .m-ttl { color: var(--rose); }
.modal.th-g .btn.bp { background: rgba(176,120,152,.12); border-color: var(--rose-dim); color: var(--rose); }
.modal.th-g .btn.bp:hover { background: rgba(176,120,152,.22); }
.modal.th-g .field input:focus, .modal.th-g .field select:focus,
.modal.th-g .link-row input:focus { border-color: var(--rose-dim); }
.modal.th-g .btn-add-link:hover { border-color: var(--rose-dim); color: var(--rose); }

/* ── MAIN AREA THEME TINTING ─────────────────────────────────── */
.main.th-c .btn.bp { background: rgba(120,152,184,.12); border-color: var(--blue-dim); color: var(--blue); }
.main.th-c .btn.bp:hover { background: rgba(120,152,184,.22); }
.main.th-c .tr-item.drag-over { border-top: 2px solid var(--blue) !important; }
.main.th-c .tr-item.pl .tr-name { color: var(--blue); }
.main.th-c .tr-item.pl { background: rgba(120,152,184,.07); border-color: rgba(120,152,184,.2); }
.main.th-c .tr-item.pl::before { background: linear-gradient(180deg, transparent, var(--blue), transparent); }

.main.th-g .btn.bp { background: rgba(176,120,152,.12); border-color: var(--rose-dim); color: var(--rose); }
.main.th-g .btn.bp:hover { background: rgba(176,120,152,.22); }
.main.th-g .tr-item.drag-over { border-top: 2px solid var(--rose) !important; }
.main.th-g .tr-item.pl .tr-name { color: var(--rose); }
.main.th-g .tr-item.pl { background: rgba(176,120,152,.07); border-color: rgba(176,120,152,.2); }
.main.th-g .tr-item.pl::before { background: linear-gradient(180deg, transparent, var(--rose), transparent); }
</style>
</head>
<body>

<!-- TOPBAR (mobile) -->
<div class="topbar">
  <button class="topbar-menu" onclick="toggleSb()">☰</button>
  <div class="topbar-title">Фонотека</div>
</div>

<div class="app">

  <!-- OVERLAY — визуальное затемнение, pointer-events: none -->
  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-title">Фонотека</div>
      <div class="sb-sub">Мой банк вдохновения</div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab ts" id="tabS" onclick="switchTab('s')">♬ Саундтрек</button>
      <button class="sb-tab"   id="tabC" onclick="switchTab('c')">✦ Персонажи</button>
    </div>
    <div class="sb-scroll" id="sbList"></div>
    <div class="sb-foot">
      <button class="btn-new" onclick="openPlModal()">+ Новый плейлист</button>
      <button class="btn-misc" id="btnMisc" onclick="switchTab('g')">◈ Разное</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div class="no-pl" id="noPl">
      <div class="big">◎</div>
      <p>Выбери плейлист слева</p>
      <p style="font-size:12px;margin-top:-6px;">или создай первый</p>
    </div>
    <div id="plView" style="display:none;flex-direction:column;overflow:hidden;flex:1;">
      <div class="m-head">
        <div style="flex:1;min-width:0;">
          <div class="m-title" id="vTitle"></div>
          <div class="m-meta"  id="vMeta"></div>
        </div>
        <div class="m-btns">
          <button class="btn bp" onclick="openTrModal()">+ Трек</button>
          <button class="btn bg" onclick="openEditPl()" style="display:inline-block;transform:scaleX(-1);">✎</button>
          <button class="btn bd" onclick="deletePl()">✕</button>
        </div>
      </div>
      <div class="tr-list" id="trList"></div>
    </div>
  </main>
</div>

<!-- PLAYER -->
<div class="player">
  <div class="p-vinyl" id="pVinyl"></div>
  <div class="p-info">
    <div id="pIdle" class="p-idle">◎ ничего не играет</div>
    <div id="pNow" style="display:none">
      <div class="p-name" id="pName"></div>
      <div class="p-art"  id="pArt"></div>
    </div>
  </div>
  <div class="p-ctrl">
    <button class="cb" onclick="prevTr()">⏮</button>
    <button class="cb main" id="ppBtn" onclick="togglePlay()">▶</button>
    <button class="cb" onclick="nextTr()">⏭</button>
  </div>
  <div class="p-prog">
    <input type="range" class="prog" id="progBar" min="0" max="100" value="0" oninput="seekTo(this.value)">
    <div class="t-row"><span id="tNow">0:00</span><span id="tDur">0:00</span></div>
  </div>
  <div class="vol-row">
    <span style="font-size:13px;color:var(--cream-dim)">🔈</span>
    <input type="range" class="vol" min="0" max="1" step="0.01" value="0.8" oninput="setVol(this.value)">
  </div>
</div>

<!-- MODAL: Playlist -->
<div class="modal-bg h" id="plModal">
  <div class="modal">
    <div class="m-ttl" id="plMTtl">Новый плейлист</div>
    <div style="font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:8px;">Категория</div>
    <div class="cat-row">
      <div class="cat-opt cs" id="oS" onclick="pickCat('s')">♬ Саундтрек</div>
      <div class="cat-opt"    id="oC" onclick="pickCat('c')">✦ Персонаж</div>
      <div class="cat-opt"    id="oG" onclick="pickCat('g')">◈ Разное</div>
    </div>
    <div class="field sub-f on" id="fTome">
      <label>Том</label>
      <select id="plTome">
        <option value="0">— Без привязки —</option>
        <option value="1">Том I</option><option value="2">Том II</option>
        <option value="3">Том III</option><option value="4">Том IV</option>
        <option value="5">Том V</option><option value="6">Том VI</option>
        <option value="7">Том VII</option>
      </select>
    </div>
    <div class="field sub-f" id="fChar">
      <label>Персонаж</label>
      <input type="text" id="plChar" placeholder="Имя персонажа…">
    </div>
    <div class="field">
      <label>Название плейлиста</label>
      <input type="text" id="plName" placeholder="Название…">
    </div>
    <div class="field">
      <label>Описание / Настроение</label>
      <input type="text" id="plDesc" placeholder="Образ, атмосфера…">
    </div>
    <div class="m-acts">
      <button class="btn bg" onclick="closePlModal()">Отмена</button>
      <button class="btn bp" onclick="savePl()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: Track -->
<div class="modal-bg h" id="trModal">
  <div class="modal">
    <div class="m-ttl" id="trMTtl">Добавить трек</div>
    <div class="field"><label>Название</label><input type="text" id="tName" placeholder="Название трека…"></div>
    <div class="field"><label>Исполнитель</label><input type="text" id="tArtist" placeholder="Исполнитель…"></div>
    <div class="field"><label>Описание / Настроение</label><input type="text" id="tMood" placeholder="Образ, атмосфера, момент…"></div>

    <div class="divider">ссылки на площадки</div>
    <div class="link-list" id="linkList"></div>
    <button class="btn-add-link" onclick="addLinkRow()">+ добавить ссылку</button>

    <div class="divider">или файл</div>
    <div class="field">
      <div class="up-area" onclick="document.getElementById('tFile').click()">
        <div class="up-tx">Нажми, чтобы выбрать аудиофайл</div>
        <div class="up-ch" id="upCh"></div>
        <input type="file" id="tFile" accept="audio/*" style="display:none" onchange="onFile(this)">
      </div>
    </div>
    <div class="m-acts">
      <button class="btn bg" onclick="closeTrModal()">Отмена</button>
      <button class="btn bp" onclick="saveTr()">Сохранить</button>
    </div>
  </div>
</div>

<audio id="aud"></audio>

<script>
// ── STATE ─────────────────────────────────────────────────────────
const SK='phonoteka_v3';
let S={pls:[],curPl:null,curTr:null,tab:'s',editPlId:null,editTrIdx:null};

function save(){
  try{
    const d=JSON.parse(JSON.stringify(S));
    d.pls.forEach(p=>p.tracks.forEach(t=>delete t._d));
    localStorage.setItem(SK,JSON.stringify(d));
  }catch(e){}
}
function load(){
  try{ const r=localStorage.getItem(SK); if(r) Object.assign(S,JSON.parse(r)); }catch(e){}
}

// ── INDEXEDDB (аудиофайлы) ─────────────────────────────────────────
const IDB_NAME='phonoteka_audio', IDB_STORE='files';
let _db=null;

function idbOpen(){
  return new Promise((res,rej)=>{
    if(_db){res(_db);return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbSet(key,blob){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(blob,key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}
async function idbGet(key){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbDel(key){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}

// blob URL текущего трека — освобождаем при смене
let _curBlobUrl=null;
function _revokeCurrent(){if(_curBlobUrl){URL.revokeObjectURL(_curBlobUrl);_curBlobUrl=null;}}

// ── AUDIO ─────────────────────────────────────────────────────────
const aud=document.getElementById('aud');
aud.volume=0.8;
aud.addEventListener('timeupdate',()=>{
  if(aud.duration){
    document.getElementById('progBar').value=(aud.currentTime/aud.duration)*100;
    document.getElementById('tNow').textContent=ft(aud.currentTime);
    document.getElementById('tDur').textContent=ft(aud.duration);
  }
});
aud.addEventListener('ended',nextTr);
aud.addEventListener('play',()=>{
  document.getElementById('ppBtn').textContent='⏸';
  document.getElementById('pVinyl').classList.add('playing');
});
aud.addEventListener('pause',()=>{
  document.getElementById('ppBtn').textContent='▶';
  document.getElementById('pVinyl').classList.remove('playing');
});
const ft=s=>{s=Math.floor(s||0);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
function seekTo(v){if(aud.duration)aud.currentTime=(v/100)*aud.duration;}
function setVol(v){aud.volume=v;}
function togglePlay(){if(aud.src){aud.paused?aud.play():aud.pause();}}

async function playTr(plId,idx){
  const pl=S.pls.find(p=>p.id===plId); if(!pl) return;
  const t=pl.tracks[idx]; if(!t) return;
  S.curPl=plId; S.curTr=idx;
  _revokeCurrent();
  if(t.ak){
    try{
      const blob=await idbGet(t.ak);
      if(blob){
        _curBlobUrl=URL.createObjectURL(blob);
        aud.src=_curBlobUrl; aud.play();
      }
    }catch(e){console.error('idbGet error',e);}
  } else {aud.src='';aud.pause();}
  document.getElementById('pIdle').style.display='none';
  document.getElementById('pNow').style.display='block';
  document.getElementById('pName').textContent=t.name;
  document.getElementById('pArt').textContent=t.artist||'';
  renderTracks();
}
function prevTr(){const pl=S.pls.find(p=>p.id===S.curPl);if(pl&&S.curTr>0)playTr(S.curPl,S.curTr-1);}
function nextTr(){const pl=S.pls.find(p=>p.id===S.curPl);if(pl&&S.curTr<pl.tracks.length-1)playTr(S.curPl,S.curTr+1);}

// ── PLATFORM DETECTION ────────────────────────────────────────────
function platform(url){
  if(!url) return null;
  try{const h=new URL(url).hostname.replace('www.','');
    if(h.includes('spotify.com')) return {cls:'pi-sp',ic:'𝄞',label:'Spotify'};
    if(h.includes('youtube.com')||h.includes('youtu.be')) return {cls:'pi-yt',ic:'▶',label:'YouTube'};
    if(h.includes('music.apple.com')||h.includes('itunes.apple.com')) return {cls:'pi-ap',ic:'♫',label:'Apple'};
    if(h.includes('soundcloud.com')) return {cls:'pi-sc',ic:'☁',label:'SC'};
  }catch(e){}
  return {cls:'pi-other',ic:'↗',label:'Link'};
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(t){
  S.tab=t;
  document.getElementById('tabS').className='sb-tab'+(t==='s'?' ts':'');
  document.getElementById('tabC').className='sb-tab'+(t==='c'?' tc':'');
  const mb=document.getElementById('btnMisc');
  mb.className='btn-misc'+(t==='g'?' on':'');
  renderSidebar();
}

// ── RENDER ────────────────────────────────────────────────────────
const ROM=['','I','II','III','IV','V','VI','VII'];

function renderSidebar(){
  const el=document.getElementById('sbList');
  const cat=S.tab;
  const pls=S.pls.filter(p=>p.cat===cat);
  if(!pls.length){el.innerHTML='<div style="padding:16px;color:var(--cream-dim);font-family:var(--font-italic);font-style:italic;font-size:13px;">Нет плейлистов</div>';return;}
  let h='';
  if(cat==='s'){
    const gr={};
    pls.forEach(p=>{const k=p.tome||0;if(!gr[k])gr[k]=[];gr[k].push(p);});
    Object.keys(gr).map(Number).sort().forEach(k=>{
      h+=`<div><div class="sec-label">${k===0?'Без привязки':'Том '+ROM[k]}</div>`;
      gr[k].forEach(p=>{h+=plRow(p,p.id===S.curPl?'as':'',k===0?'♬':ROM[k]);});
      h+='</div>';
    });
  } else if(cat==='c'){
    const gr={};
    pls.forEach(p=>{const k=p.charName||'—';if(!gr[k])gr[k]=[];gr[k].push(p);});
    Object.keys(gr).sort().forEach(k=>{
      h+=`<div><div class="sec-label r">${esc(k)}</div>`;
      gr[k].forEach(p=>{h+=plRow(p,p.id===S.curPl?'ac':'','✦');});
      h+='</div>';
    });
  } else {
    pls.forEach(p=>{h+=plRow(p,p.id===S.curPl?'ag':'','◈');});
  }
  el.innerHTML=h;
  setTimeout(initSbDrag,0);
}

function plRow(pl,ac,ic){
  return `<div class="pl-row ${ac}" data-plid="${pl.id}" onclick="selPl('${pl.id}')"><span class="pl-drag" data-sbdrag="true">⠿</span><span class="pl-ic">${ic}</span><span class="pl-nm">${esc(pl.name)}</span><span class="pl-ct">${pl.tracks.length}</span></div>`;
}

function renderMain(){
  const pl=S.pls.find(p=>p.id===S.curPl);
  document.getElementById('noPl').style.display=pl?'none':'flex';
  document.getElementById('plView').style.display=pl?'flex':'none';
  const main=document.querySelector('.main');
  main.classList.remove('th-s','th-c','th-g');
  if(pl) main.classList.add('th-'+(pl.cat||'s'));
  if(!pl) return;
  let m='';
  if(pl.cat==='s'&&pl.tome>0) m+=`Том ${ROM[pl.tome]} · `;
  if(pl.cat==='c'&&pl.charName) m+=`${pl.charName} · `;
  m+=plr(pl.tracks.length,'трек','трека','треков');
  if(pl.desc) m+=` · ${pl.desc}`;
  document.getElementById('vTitle').textContent=pl.name;
  document.getElementById('vMeta').textContent=m;
  renderTracks();
}

function renderTracks(){
  const pl=S.pls.find(p=>p.id===S.curPl); if(!pl) return;
  const el=document.getElementById('trList');
  if(!pl.tracks.length){
    el.innerHTML=`<div class="empty"><div class="empty-ic">◎</div><div class="empty-tx">Плейлист пуст — добавь первый трек</div></div>`;
    return;
  }
  el.innerHTML=pl.tracks.map((t,i)=>{
    const playing=S.curPl===pl.id&&S.curTr===i;
    const links=(t.urls||[]).filter(u=>u);
    let icHtml=links.map(u=>{
      const p=platform(u);
      return `<a class="pl-icon-btn ${p.cls}" href="${esc(u)}" target="_blank" onclick="event.stopPropagation()" title="${p.label}">${p.ic}</a>`;
    }).join('');
    if(t.ak){
      icHtml=`<span class="pl-icon-btn pi-mp3 playable" onclick="event.stopPropagation();playTr('${pl.id}',${i})" title="Играть MP3">♪</span>`+icHtml;
    }
    return `<div class="tr-item${playing?' pl':''}" data-idx="${i}" data-plid="${pl.id}">
      <span class="drag-handle" data-drag="true">⠿</span>
      <span class="tr-num" onclick="trClick('${pl.id}',${i})">${i+1}</span>
      <span class="tr-playing-ic">♪</span>
      <div class="tr-info" onclick="trClick('${pl.id}',${i})">
        <div class="tr-name">${esc(t.name)}</div>
        ${t.artist?`<div class="tr-artist">${esc(t.artist)}</div>`:''}
        ${t.mood?`<div class="tr-mood">${esc(t.mood)}</div>`:''}
      </div>
      <div class="tr-links">${icHtml}</div>
      <div class="tr-actions">
        <button class="ic-btn edit" onclick="editTr(event,'${pl.id}',${i})">✎</button>
        <button class="ic-btn" onclick="delTr(event,'${pl.id}',${i})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function render(){renderSidebar();renderMain();}

// ── ACTIONS ───────────────────────────────────────────────────────
function selPl(id){S.curPl=id;closeSb();render();}

function trClick(plId,idx){
  const pl=S.pls.find(p=>p.id===plId);const t=pl?.tracks[idx];if(!t)return;
  if(t.ak) playTr(plId,idx);
  else if(t.urls&&t.urls[0]) window.open(t.urls[0],'_blank');
}

function delTr(e,plId,idx){
  e.stopPropagation();
  const pl=S.pls.find(p=>p.id===plId);if(!pl)return;
  const t=pl.tracks[idx];
  if(t.ak) idbDel(t.ak).catch(()=>{});
  pl.tracks.splice(idx,1);
  if(S.curPl===plId&&S.curTr===idx){
    S.curTr=null;aud.pause();aud.src='';_revokeCurrent();
    document.getElementById('pIdle').style.display='block';
    document.getElementById('pNow').style.display='none';
    document.getElementById('pVinyl').classList.remove('playing');
  }
  save();render();
}

function editTr(e,plId,idx){
  e.stopPropagation();
  S.editPlId=plId;S.editTrIdx=idx;
  const t=S.pls.find(p=>p.id===plId).tracks[idx];
  document.getElementById('trMTtl').textContent='Редактировать трек';
  document.getElementById('tName').value=t.name;
  document.getElementById('tArtist').value=t.artist||'';
  document.getElementById('tMood').value=t.mood||'';
  document.getElementById('upCh').textContent=t.ak?'(MP3 загружен)':'';
  buildLinkRows(t.urls||[]);
  const _epl=S.pls.find(p=>p.id===S.editPlId||p.id===S.curPl);
  const _em=document.querySelector('#trModal .modal');
  if(_em){_em.classList.remove('th-s','th-c','th-g');if(_epl)_em.classList.add('th-'+(_epl.cat||'s'));}
  document.getElementById('trModal').classList.remove('h');
}

function deletePl(){
  const pl=S.pls.find(p=>p.id===S.curPl);
  if(!pl||!confirm(`Удалить «${pl.name}»?`))return;
  pl.tracks.forEach(t=>{if(t.ak)idbDel(t.ak).catch(()=>{});});
  S.pls=S.pls.filter(p=>p.id!==S.curPl);S.curPl=null;
  aud.pause();aud.src='';_revokeCurrent();
  document.getElementById('pIdle').style.display='block';
  document.getElementById('pNow').style.display='none';
  document.getElementById('pVinyl').classList.remove('playing');
  save();render();
}

// ── PLAYLIST MODAL ────────────────────────────────────────────────
let mCat='s';
function pickCat(c){
  mCat=c;
  ['S','C','G'].forEach(x=>document.getElementById('o'+x).className='cat-opt');
  const cls={s:'cs',c:'cc',g:'cg'};
  document.getElementById('o'+c.toUpperCase()).className='cat-opt '+cls[c];
  document.getElementById('fTome').className='field sub-f'+(c==='s'?' on':'');
  document.getElementById('fChar').className='field sub-f'+(c==='c'?' on':'');
}

function openPlModal(){
  closeSb();
  S.editPlId=null;
  document.getElementById('plMTtl').textContent='Новый плейлист';
  const cat=S.tab==='g'?'g':S.tab;
  pickCat(cat);
  ['plName','plDesc','plChar'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('plTome').value='0';
  const _m=document.querySelector('#plModal .modal');
  if(_m){_m.classList.remove('th-s','th-c','th-g');_m.classList.add('th-'+cat);}
  document.getElementById('plModal').classList.remove('h');
}

function openEditPl(){
  const pl=S.pls.find(p=>p.id===S.curPl);if(!pl)return;
  S.editPlId=pl.id;
  document.getElementById('plMTtl').textContent='Редактировать плейлист';
  pickCat(pl.cat||'s');
  document.getElementById('plName').value=pl.name;
  document.getElementById('plDesc').value=pl.desc||'';
  document.getElementById('plTome').value=String(pl.tome||0);
  document.getElementById('plChar').value=pl.charName||'';
  const _m=document.querySelector('#plModal .modal');
  if(_m){_m.classList.remove('th-s','th-c','th-g');_m.classList.add('th-'+(pl.cat||'s'));}
  document.getElementById('plModal').classList.remove('h');
}

function closePlModal(){document.getElementById('plModal').classList.add('h');}

function savePl(){
  const name=document.getElementById('plName').value.trim();if(!name){document.getElementById('plName').focus();return;}
  const obj={cat:mCat,name,desc:document.getElementById('plDesc').value.trim(),tome:parseInt(document.getElementById('plTome').value)||0,charName:document.getElementById('plChar').value.trim()};
  if(S.editPlId){
    const pl=S.pls.find(p=>p.id===S.editPlId);if(pl)Object.assign(pl,obj);
  } else {
    const pl={id:'pl_'+Date.now(),tracks:[],...obj};
    S.pls.push(pl);S.curPl=pl.id;
  }
  S.tab=mCat;
  save();render();switchTab(mCat);closePlModal();
}

// ── TRACK MODAL ───────────────────────────────────────────────────
let pendAu=null;

function buildLinkRows(urls){
  const ll=document.getElementById('linkList');
  ll.innerHTML='';
  const list=urls.length?urls:[''];
  list.forEach(u=>addLinkRow(u));
}

function addLinkRow(val=''){
  const ll=document.getElementById('linkList');
  const row=document.createElement('div');
  row.className='link-row';
  row.innerHTML=`<input type="url" placeholder="https://…" value="${esc(val)}"><button class="link-rm" onclick="this.parentNode.remove()">✕</button>`;
  ll.appendChild(row);
  row.querySelector('input').focus();
}

function getLinks(){
  return Array.from(document.querySelectorAll('#linkList .link-row input'))
    .map(i=>i.value.trim()).filter(Boolean);
}

function openTrModal(){
  closeSb();
  S.editTrIdx=null;S.editPlId=null;pendAu=null;
  document.getElementById('trMTtl').textContent='Добавить трек';
  ['tName','tArtist','tMood'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tFile').value='';
  document.getElementById('upCh').textContent='';
  buildLinkRows([]);
  const _tpl=S.pls.find(p=>p.id===S.curPl);
  const _tm=document.querySelector('#trModal .modal');
  if(_tm){_tm.classList.remove('th-s','th-c','th-g');if(_tpl)_tm.classList.add('th-'+(_tpl.cat||'s'));}
  document.getElementById('trModal').classList.remove('h');
}

function closeTrModal(){document.getElementById('trModal').classList.add('h');pendAu=null;}

function onFile(inp){
  const f=inp.files[0];if(!f)return;
  pendAu=f; // храним Blob напрямую, без base64
  document.getElementById('upCh').textContent=f.name;
  if(!document.getElementById('tName').value)
    document.getElementById('tName').value=f.name.replace(/\.[^.]+$/,'');
}

async function saveTr(){
  const name=document.getElementById('tName').value.trim();if(!name){document.getElementById('tName').focus();return;}
  const artist=document.getElementById('tArtist').value.trim();
  const mood=document.getElementById('tMood').value.trim();
  const urls=getLinks();
  const plId=S.editPlId||S.curPl;
  const pl=S.pls.find(p=>p.id===plId);if(!pl)return;
  if(S.editTrIdx!==null){
    const t=pl.tracks[S.editTrIdx];Object.assign(t,{name,artist,mood,urls});
    if(pendAu){
      if(t.ak) await idbDel(t.ak).catch(()=>{});
      t.ak='au_'+Date.now();
      try{await idbSet(t.ak,pendAu);}catch(e){alert('Не удалось сохранить файл.');delete t.ak;}
    }
  } else {
    const t={name,artist,mood,urls};
    if(pendAu){
      t.ak='au_'+Date.now();
      try{await idbSet(t.ak,pendAu);}catch(e){alert('Не удалось сохранить файл.');delete t.ak;}
    }
    pl.tracks.push(t);
  }
  S.editTrIdx=null;S.editPlId=null;pendAu=null;
  save();render();closeTrModal();
}

// ── SIDEBAR DRAG ──────────────────────────────────────────────────
let sbDrag={active:false,fromId:null,el:null,clone:null,startY:0,cloneTop:0};

function initSbDrag(){
  const list=document.getElementById('sbList');
  if(!list) return;
  list.removeEventListener('touchstart',onSbDragStart);
  list.removeEventListener('touchmove',onSbDragMove);
  list.removeEventListener('touchend',onSbDragEnd);
  list.addEventListener('touchstart',onSbDragStart,{passive:false});
  list.addEventListener('touchmove',onSbDragMove,{passive:false});
  list.addEventListener('touchend',onSbDragEnd,{passive:false});
}

function onSbDragStart(e){
  const handle=e.target.closest('[data-sbdrag]');
  if(!handle) return;
  const row=handle.closest('.pl-row');
  if(!row) return;
  e.preventDefault();
  const touch=e.touches[0];
  sbDrag.active=true;
  sbDrag.fromId=row.dataset.plid;
  sbDrag.el=row;
  sbDrag.startY=touch.clientY;
  row.classList.add('sb-dragging');
  const rect=row.getBoundingClientRect();
  sbDrag.cloneTop=rect.top;
  const clone=row.cloneNode(true);
  clone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${row.offsetWidth}px;opacity:.85;pointer-events:none;z-index:9999;background:var(--bg3);border:1px solid var(--gold-dim);border-radius:6px;`;
  document.body.appendChild(clone);
  sbDrag.clone=clone;
}

function onSbDragMove(e){
  if(!sbDrag.active) return;
  e.preventDefault();
  const touch=e.touches[0];
  const dy=touch.clientY-sbDrag.startY;
  sbDrag.clone.style.top=(sbDrag.cloneTop+dy)+'px';
  document.querySelectorAll('.pl-row').forEach(el=>el.classList.remove('sb-drag-over'));
  const rows=Array.from(document.querySelectorAll('.pl-row:not(.sb-dragging)'));
  for(const el of rows){
    const r=el.getBoundingClientRect();
    if(touch.clientY>=r.top&&touch.clientY<=r.bottom){el.classList.add('sb-drag-over');break;}
  }
}

function onSbDragEnd(e){
  if(!sbDrag.active) return;
  if(sbDrag.clone) sbDrag.clone.remove();
  document.querySelectorAll('.pl-row.sb-dragging').forEach(el=>el.classList.remove('sb-dragging'));
  const overEl=document.querySelector('.pl-row.sb-drag-over');
  document.querySelectorAll('.pl-row').forEach(el=>el.classList.remove('sb-drag-over'));
  if(overEl&&overEl.dataset.plid!==sbDrag.fromId){
    const toId=overEl.dataset.plid;
    const allPls=S.pls;
    const fromGlobal=allPls.findIndex(p=>p.id===sbDrag.fromId);
    const toGlobal=allPls.findIndex(p=>p.id===toId);
    if(fromGlobal>=0&&toGlobal>=0){
      const item=allPls.splice(fromGlobal,1)[0];
      const newTo=allPls.findIndex(p=>p.id===toId);
      allPls.splice(newTo+1,0,item);
      save();renderSidebar();initSbDrag();
    }
  }
  sbDrag={active:false,fromId:null,el:null,clone:null,startY:0,cloneTop:0};
}

// ── TRACK DRAG ────────────────────────────────────────────────────
let drag={active:false,plId:null,fromIdx:null,toIdx:null,el:null,clone:null,startY:0,cloneTop:0};
let _dragInited=false;

function initDrag(){
  if(_dragInited) return;
  const list=document.getElementById('trList');
  if(!list) return;
  _dragInited=true;
  list.addEventListener('touchstart',onDragStart,{passive:false});
  list.addEventListener('touchmove',onDragMove,{passive:false});
  list.addEventListener('touchend',onDragEnd,{passive:false});
}

function onDragStart(e){
  const handle=e.target.closest('[data-drag]');
  if(!handle) return;
  const item=handle.closest('.tr-item');
  if(!item) return;
  e.preventDefault();
  const touch=e.touches[0];
  drag.active=true;
  drag.plId=item.dataset.plid;
  drag.fromIdx=parseInt(item.dataset.idx);
  drag.toIdx=drag.fromIdx;
  drag.el=item;
  drag.startY=touch.clientY;
  item.classList.add('dragging');
  const rect=item.getBoundingClientRect();
  drag.cloneTop=rect.top;
  const clone=item.cloneNode(true);
  const _pl=S.pls.find(p=>p.id===drag.plId);
  const _bc=_pl?.cat==='c'?'#486080':_pl?.cat==='g'?'#6c4060':'#8860b8';
  clone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${item.offsetWidth}px;opacity:.85;pointer-events:none;z-index:9999;background:var(--bg3);border:1px solid ${_bc};border-radius:8px;transition:none;`;
  document.body.appendChild(clone);
  drag.clone=clone;
}

function onDragMove(e){
  if(!drag.active) return;
  e.preventDefault();
  const touch=e.touches[0];
  drag.clone.style.top=(drag.cloneTop+(touch.clientY-drag.startY))+'px';
  document.querySelectorAll('.tr-item').forEach(el=>el.classList.remove('drag-over'));
  drag.toIdx=drag.fromIdx;
  const els=Array.from(document.querySelectorAll('.tr-item:not(.dragging)'));
  for(const el of els){
    const r=el.getBoundingClientRect();
    if(touch.clientY>=r.top&&touch.clientY<=r.bottom){
      el.classList.add('drag-over');
      drag.toIdx=parseInt(el.dataset.idx);
      break;
    }
  }
}

function onDragEnd(e){
  if(!drag.active) return;
  const fromIdx=drag.fromIdx, toIdx=drag.toIdx, plId=drag.plId;
  if(drag.clone){drag.clone.remove();drag.clone=null;}
  document.querySelectorAll('.tr-item').forEach(el=>el.classList.remove('drag-over','dragging'));
  drag={active:false,plId:null,fromIdx:null,toIdx:null,el:null,clone:null,startY:0,cloneTop:0};
  if(fromIdx!==null&&toIdx!==null&&fromIdx!==toIdx){
    const pl=S.pls.find(p=>p.id===plId);
    if(pl){
      const moved=pl.tracks.splice(fromIdx,1)[0];
      pl.tracks.splice(toIdx,0,moved);
      if(S.curPl===plId){
        if(S.curTr===fromIdx) S.curTr=toIdx;
        else if(S.curTr>fromIdx&&S.curTr<=toIdx) S.curTr--;
        else if(S.curTr<fromIdx&&S.curTr>=toIdx) S.curTr++;
      }
      save(); renderTracks();
    }
  }
}

// ── UTILS ─────────────────────────────────────────────────────────
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function plr(n,a,b,c){const m=n%10,h=n%100;if(m===1&&h!==11)return`${n} ${a}`;if([2,3,4].includes(m)&&![12,13,14].includes(h))return`${n} ${b}`;return`${n} ${c}`;}
function toggleSb(){const sb=document.getElementById('sidebar');sb.classList.toggle('open');document.getElementById('overlay').classList.toggle('on',sb.classList.contains('open'));}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('on');}

document.getElementById('plModal').addEventListener('click',e=>{if(e.target===document.getElementById('plModal'))closePlModal();});
document.getElementById('trModal').addEventListener('click',e=>{if(e.target===document.getElementById('trModal'))closeTrModal();});
document.getElementById('plName').addEventListener('keydown',e=>{if(e.key==='Enter')savePl();});
document.getElementById('tName').addEventListener('keydown',e=>{if(e.key==='Enter')saveTr();});

// Закрытие сайдбара по клику/тапу вне него — надёжнее чем overlay onclick на Android
document.addEventListener('click', e => {
  const sb = document.getElementById('sidebar');
  if (!sb.classList.contains('open')) return;
  if (!sb.contains(e.target) && e.target !== document.querySelector('.topbar-menu')) closeSb();
});
document.addEventListener('touchend', e => {
  const sb = document.getElementById('sidebar');
  if (!sb.classList.contains('open')) return;
  if (!sb.contains(e.target) && e.target !== document.querySelector('.topbar-menu')) closeSb();
}, {passive:true});

load();
switchTab(S.tab||'s');
render(); initDrag(); initSbDrag();
</script>
